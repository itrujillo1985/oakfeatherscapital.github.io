<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OakFeathers Capital - Private Investment Holding Company</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background-color: 
;
            color: 
;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            padding: 40px 20px;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 60px;
        }

        .logo {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
        }

        .brand-name {
            font-size: 24px;
            letter-spacing: 4px;
            font-weight: 400;
            margin-bottom: 8px;
        }

        .brand-subtitle {
            font-size: 14px;
            letter-spacing: 2px;
            font-weight: 300;
        }

        .cta-button {
            background-color: 
;
            color: 
;
            padding: 14px 40px;
            font-size: 13px;
            letter-spacing: 2px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .cta-button:hover {
            background-color: 
;
            transform: translateY(-2px);
        }

        footer {
            padding: 30px 20px;
            text-align: center;
            font-size: 12px;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.6);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
        }

        @media (max-width: 768px) {
            .logo {
                width: 100px;
                height: 100px;
            }

            .brand-name {
                font-size: 20px;
            }

            .brand-subtitle {
                font-size: 12px;
            }

            .cta-button {
                padding: 12px 32px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="logo.png" alt="OakFeathers Capital Logo" class="logo">
            <div class="brand-name">OAKFEATHERS</div>
            <div class="brand-subtitle">CAPITAL</div>
        </div>
        
        <a href="mailto:contact@oakfeatherscapital.com" class="cta-button">Contact Us</a>
    </div>

    <footer>
        2026 OakFeathers Capital. All rights reserved.
    </footer>
</body>
</html>
